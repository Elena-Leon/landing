<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Елена Дмитриева — Персональная визитка</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(ellipse 70% 60% at 5% 5%,  rgba(100, 185, 255, 0.72) 0%, transparent 55%),
        radial-gradient(ellipse 55% 65% at 95% 95%, rgba(175, 110, 255, 0.55) 0%, transparent 55%),
        radial-gradient(ellipse 40% 35% at 52% 0%,  rgba(100, 228, 255, 0.45) 0%, transparent 50%),
        linear-gradient(135deg, #b8d9ff 0%, #ddc8ff 50%, #b8e6ff 100%);
      color: #2f2a4d;
    }

    /* ── PAGE LAYOUT ── */
    .page {
      display: flex;
      height: 100vh;
    }

    /* ── LEFT COLUMN ── */
    .content {
      flex: 0 0 58%;
      width: 58%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding:
        clamp(28px, 3.5vh, 52px)
        clamp(24px, 3vw, 44px)
        clamp(28px, 3.5vh, 52px)
        clamp(40px, 5.5vw, 76px);
      overflow-y: auto;
    }

    .label {
      font-size: 11px;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: rgba(50, 30, 110, 0.52);
      margin-bottom: clamp(12px, 1.8vh, 22px);
    }

    /* name + divider share the same width (= longest text line) */
    .name-wrap {
      align-self: flex-start;
      max-width: 100%;
      margin-bottom: clamp(12px, 1.8vh, 22px);
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(46px, 5.4vw, 76px);
      line-height: 1.0;
      font-weight: 700;
      background: linear-gradient(90deg, #5b9bf0, #7b2fbe, #00c8b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 300% 100%;
      animation: gradMove 5s ease-in-out infinite;
    }

    /* animated underline — spans exactly the width of the longest name line */
    .divider {
      display: block;
      height: 3px;
      width: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #5b9bf0, #7b2fbe, #00c8b8);
      margin-top: 8px;
      animation: divAnim 3.8s ease-in-out infinite;
    }

    /* grows left→right, pause, shrinks left→right (disappears to the right), jump back */
    @keyframes divAnim {
      0%   { clip-path: inset(0 100% 0 0   round 999px); }
      38%  { clip-path: inset(0 0   0 0   round 999px); }
      58%  { clip-path: inset(0 0   0 0   round 999px); }
      95%  { clip-path: inset(0 0   0 100% round 999px); }
      100% { clip-path: inset(0 100% 0 0   round 999px); }
    }

    .role {
      font-size: clamp(13px, 1.25vw, 15px);
      line-height: 1.65;
      color: rgba(55, 35, 115, 0.72);
      margin-bottom: clamp(14px, 1.8vh, 24px);
      max-width: 400px;
    }

    .role .accent {
      background: linear-gradient(90deg, #7b2fbe, #4a90d9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 600;
    }

    /* ── TAGS ── */
    .tags {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: clamp(14px, 1.8vh, 24px);
    }

    .tag-row {
      display: flex;
      gap: 8px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 6px 13px;
      border-radius: 40px;
      border: 1px solid rgba(120, 90, 200, 0.2);
      background: rgba(255, 255, 255, 0.68);
      color: rgba(55, 35, 115, 0.78);
      font-size: 11.5px;
      white-space: nowrap;
      backdrop-filter: blur(8px);
      cursor: default;
      will-change: transform;
    }

    /* ── MESSENGERS ── */
    .messengers {
      display: flex;
      gap: 12px;
      margin-bottom: clamp(14px, 1.8vh, 24px);
    }

    .messenger {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.9);
      display: grid;
      place-items: center;
      box-shadow: 0 6px 16px rgba(80, 55, 170, 0.1);
      color: #8b5cf6;
      text-decoration: none;
      border: 2px solid transparent;
      position: relative;
      overflow: visible;
      cursor: pointer;
      will-change: transform;
    }

    .messenger svg,
    .messenger img {
      width: 26px;
      height: 26px;
      fill: currentColor;
    }

    .messenger-label {
      position: absolute;
      left: 50%;
      bottom: -28px;
      transform: translateX(-50%) translateY(6px);
      background: rgba(30, 10, 90, 0.95);
      color: #fff;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 999px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      z-index: 10;
    }

    .messenger:hover .messenger-label {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── CTA ── */
    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      min-width: 200px;
      min-height: 50px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #8b5cf6 0%, #7b2fbe 20%, #5b9bf0 40%, #38d8d8 60%, #5b9bf0 80%, #7b2fbe 100%);
      background-size: 400% 100%;
      animation: ctaGrad 6s ease-in-out infinite;
      color: white;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      padding: 0 28px;
      cursor: pointer;
      margin-bottom: 10px;
      will-change: transform;
    }

    .cta svg {
      margin-right: 10px;
      width: 18px;
      height: 18px;
      fill: white;
      flex-shrink: 0;
    }

    .note {
      font-size: 11px;
      color: rgba(55, 35, 115, 0.5);
    }

    /* ── RIGHT COLUMN ── */
    .photo-col {
      flex: 0 0 42%;
      width: 42%;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    /* fade photo into the background */
    .photo-col::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to right,
        rgba(185, 210, 255, 1)    0%,
        rgba(185, 210, 255, 0.65) 10%,
        rgba(185, 210, 255, 0.12) 26%,
        transparent               44%
      );
      z-index: 1;
      pointer-events: none;
    }

    .photo-col img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: 100%;
      object-fit: contain;
      object-position: right center;
      display: block;
    }

    /* ── KEYFRAMES ── */
    @keyframes gradMove {
      0%   { background-position: 0%   50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0%   50%; }
    }

    @keyframes ctaGrad {
      0%   { background-position: 0%   50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0%   50%; }
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      html, body { overflow: hidden auto; }

      .page {
        flex-direction: column;
        height: auto;
        min-height: 100vh;
      }

      .photo-col {
        flex: none;
        width: 100%;
        height: 65vw;
        max-height: 380px;
        order: -1;
      }

      .photo-col::before {
        background: linear-gradient(to bottom,
          transparent               50%,
          rgba(185, 215, 255, 0.75) 80%,
          rgba(185, 215, 255, 1)   100%
        );
      }

      .content {
        flex: none;
        width: 100%;
        padding: 24px 22px 44px;
        overflow-y: visible;
      }

      .cta {
        width: 100%;
        min-width: unset;
      }
    }

    @media (max-width: 400px) {
      .name { font-size: 42px; }
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="content">
      <span class="label">ПЕРСОНАЛЬНАЯ ВИЗИТКА</span>

      <div class="name-wrap">
        <h1 class="name">Елена<br>Дмитриева</h1>
        <span class="divider"></span>
      </div>

      <p class="role">
        <span class="accent">Эксперт</span> по созданию <span class="accent">AI-сотрудников</span> для автоматизации бизнеса <span class="accent">24/7</span>
      </p>

      <div class="tags">
        <div class="tag-row">
          <span class="tag">🤖 AI-помощники</span>
          <span class="tag">⚡ Автоматизация</span>
          <span class="tag">🔗 Интеграция</span>
        </div>
        <div class="tag-row">
          <span class="tag">📋 Бизнес-процессы</span>
          <span class="tag">🚀 Масштабирование</span>
        </div>
      </div>

      <div class="messengers">
        <a class="messenger" href="https://t.me/Elna_DEL" target="_blank" aria-label="Telegram">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22 2.727L2.833 10.97l4.134 1.286 1.553 4.756 2.14-2.07 4.348 3.342L22 2.727zM8.557 14.526l-.845-2.579 8.448-5.397-5.315 5.95 2.953 1.49-1.241.536z"/></svg>

          <span class="messenger-label">позвонить</span>
        </a>
      </div>

      <a class="cta" href="https://t.me/Elna_DEL" target="_blank">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M21.2 3.2L3.2 10.1c-.6.2-.6.6-.1.8l4.2 1.3 1.6 5.1c.1.4.4.5.7.3l2.1-1.4 4.3 3.2c.5.4 1 .2 1.1-.5l3.5-16.1c.1-.7-.5-1.1-1.1-.9zM8.8 13.7l-1.1-3.5 10.2-4.9-6.8 8.4-2.3 0z"/>
        </svg>
        Написать мне
      </a>

      <p class="note">для владельцев малого и среднего бизнеса</p>
    </div>

    <div class="photo-col">
      <img src="with cat — копия.png" alt="Елена Дмитриева">
    </div>

  </div>

  <script>
    // 3-D tilt: edge closest to cursor rises, shadow appears on that edge
    function addTilt(el, maxDeg) {
      maxDeg = maxDeg || 14;

      el.addEventListener('mouseenter', function () {
        this.style.transition = 'none';
      });

      el.addEventListener('mousemove', function (e) {
        var r   = this.getBoundingClientRect();
        var x   = (e.clientX - r.left)  / r.width  - 0.5; // -0.5 … 0.5
        var y   = (e.clientY - r.top)   / r.height - 0.5;
        var rX  = -y * maxDeg * 2;   // tilt forward/back
        var rY  =  x * maxDeg * 2;   // tilt left/right
        // shadow on the side closest to the cursor
        var sX  = x  * 14;
        var sY  = -y * 10 + 10;
        this.style.transform   = 'perspective(420px) rotateX(' + rX + 'deg) rotateY(' + rY + 'deg) translateZ(6px)';
        this.style.boxShadow   = sX + 'px ' + sY + 'px 22px rgba(100,55,210,0.32)';
        this.style.borderColor = 'rgba(139,92,246,0.55)';
      });

      el.addEventListener('mouseleave', function () {
        this.style.transition  = 'transform .45s ease, box-shadow .45s ease, border-color .45s ease';
        this.style.transform   = '';
        this.style.boxShadow   = '';
        this.style.borderColor = '';
      });
    }

    document.querySelectorAll('.tag, .messenger, .cta').forEach(function (el) {
      addTilt(el, 13);
    });
  </script>
</body>
</html>
