<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Елена Дмитриева — Персональная визитка</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(ellipse at 10% 20%, rgba(200, 220, 255, 0.6) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(220, 200, 255, 0.4) 0%, transparent 45%),
        linear-gradient(135deg, #eef4ff 0%, #f5f0ff 50%, #eaf5ff 100%);
      color: #2f2a4d;
    }

    .page {
      display: flex;
      min-height: 100vh;
    }

    /* ── LEFT COLUMN ── */
    .content {
      flex: 0 0 52%;
      max-width: 52%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 64px 48px 64px 72px;
      position: relative;
      z-index: 2;
    }

    .label {
      font-size: 11px;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: rgba(60, 40, 120, 0.5);
      margin-bottom: 30px;
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 76px;
      line-height: 1.0;
      font-weight: 700;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #5B9BF0 0%, #7B2FBE 50%, #00C8B8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 300% 100%;
      animation: gradientMove 5s ease-in-out infinite;
    }

    .divider {
      width: 64px;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, #5B9BF0, #7B2FBE);
      margin-bottom: 24px;
    }

    .role {
      font-size: 16px;
      line-height: 1.65;
      color: rgba(60, 40, 120, 0.72);
      margin-bottom: 30px;
      max-width: 400px;
    }

    .role .accent {
      background: linear-gradient(90deg, #7B2FBE, #4A90D9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 600;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 34px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 8px 16px;
      border-radius: 40px;
      border: 1px solid rgba(120, 90, 200, 0.2);
      background: rgba(255, 255, 255, 0.72);
      color: rgba(60, 40, 120, 0.75);
      font-size: 12px;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }

    .messengers {
      display: flex;
      gap: 14px;
      margin-bottom: 34px;
    }

    .messenger {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: white;
      display: grid;
      place-items: center;
      box-shadow: 0 8px 20px rgba(100, 75, 180, 0.11);
      color: #8B5CF6;
      text-decoration: none;
      border: 2px solid transparent;
      transition: transform 250ms ease, box-shadow 250ms ease, border-color 250ms ease;
      position: relative;
      overflow: visible;
    }

    .messenger:hover {
      transform: translateY(-3px) scale(1.08);
      border-color: rgba(139, 92, 246, 0.4);
      box-shadow: 0 16px 32px rgba(139, 92, 246, 0.2);
    }

    .messenger svg,
    .messenger img {
      width: 28px;
      height: 28px;
      fill: currentColor;
    }

    .messenger-label {
      position: absolute;
      left: 50%;
      bottom: -30px;
      transform: translateX(-50%) translateY(6px);
      background: rgba(38, 15, 96, 0.95);
      color: #fff;
      font-size: 11px;
      padding: 5px 10px;
      border-radius: 999px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .messenger:hover .messenger-label {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      min-width: 220px;
      min-height: 54px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #8B5CF6 0%, #7B2FBE 20%, #5B9BF0 40%, #38D8D8 60%, #5B9BF0 80%, #7B2FBE 100%);
      background-size: 400% 100%;
      animation: ctaGrad 6s ease-in-out infinite;
      color: white;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      padding: 0 30px;
      cursor: pointer;
      margin-bottom: 14px;
    }

    .cta svg {
      margin-right: 10px;
      width: 20px;
      height: 20px;
      fill: white;
      flex-shrink: 0;
    }

    .note {
      font-size: 12px;
      color: rgba(60, 40, 120, 0.5);
    }

    /* ── RIGHT COLUMN ── */
    .photo-col {
      flex: 0 0 48%;
      max-width: 48%;
      position: relative;
      overflow: hidden;
    }

    /* fade left edge to blend with background */
    .photo-col::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, #eef4ff 0%, rgba(238, 244, 255, 0.4) 20%, transparent 50%);
      z-index: 1;
      pointer-events: none;
    }

    .photo-col img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }

    /* ── ANIMATIONS ── */
    @keyframes gradientMove {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes ctaGrad {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .page {
        flex-direction: column;
      }

      .photo-col {
        flex: none;
        max-width: 100%;
        width: 100%;
        height: 72vw;
        max-height: 420px;
        order: -1;
      }

      .photo-col::before {
        background: linear-gradient(to bottom, transparent 55%, #eef4ff 100%);
      }

      .content {
        flex: none;
        max-width: 100%;
        padding: 28px 24px 52px;
      }

      .name {
        font-size: 52px;
      }

      .role {
        font-size: 15px;
        max-width: 100%;
      }

      .cta {
        width: 100%;
        min-width: unset;
      }

      .tags {
        gap: 8px;
      }
    }

    @media (max-width: 400px) {
      .name {
        font-size: 42px;
      }
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="content">
      <span class="label">ПЕРСОНАЛЬНАЯ ВИЗИТКА</span>

      <h1 class="name">Елена Дмитриева</h1>

      <div class="divider"></div>

      <p class="role">
        <span class="accent">Эксперт</span> по созданию <span class="accent">AI-сотрудников</span> для автоматизации бизнеса <span class="accent">24/7</span>
      </p>

      <div class="tags">
        <span class="tag">🤖 AI-помощники</span>
        <span class="tag">⚡ Автоматизация</span>
        <span class="tag">🔗 Интеграция</span>
        <span class="tag">📋 Бизнес-процессы</span>
        <span class="tag">🚀 Масштабирование</span>
      </div>

      <div class="messengers">
        <a class="messenger" href="https://t.me/Elna_DEL" target="_blank" aria-label="Telegram">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22 2.727L2.833 10.97l4.134 1.286 1.553 4.756 2.14-2.07 4.348 3.342L22 2.727zM8.557 14.526l-.845-2.579 8.448-5.397-5.315 5.95 2.953 1.49-1.241.536z"/></svg>
          <span class="messenger-label">написать</span>
        </a>
        <a class="messenger" href="landing.html" target="_blank" aria-label="Лендинг">
          <img src="глаз.png" alt="Лендинг" width="28" height="28" />
          <span class="messenger-label">посмотреть</span>
        </a>
        <a class="messenger" href="tel:+0000000000" aria-label="Телефон">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.62 10.79a15.053 15.053 0 006.59 6.59l2.2-2.2a1 1 0 011.06-.27c1.12.37 2.33.57 3.57.57a1 1 0 011 1V20a1 1 0 01-1 1C9.92 21 3 14.08 3 5a1 1 0 011-1h3.5a1 1 0 011 1c0 1.24.2 2.45.57 3.57a1 1 0 01-.27 1.06l-2.18 2.16z"/></svg>
          <span class="messenger-label">позвонить</span>
        </a>
      </div>

      <a class="cta" href="https://t.me/Elna_DEL" target="_blank">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M21.2 3.2L3.2 10.1c-.6.2-.6.6-.1.8l4.2 1.3 1.6 5.1c.1.4.4.5.7.3l2.1-1.4 4.3 3.2c.5.4 1 .2 1.1-.5l3.5-16.1c.1-.7-.5-1.1-1.1-.9zM8.8 13.7l-1.1-3.5 10.2-4.9-6.8 8.4-2.3 0z"/>
        </svg>
        Написать мне
      </a>

      <p class="note">для владельцев малого и среднего бизнеса</p>
    </div>

    <div class="photo-col">
      <img src="with cat.png" alt="Елена Дмитриева">
    </div>

  </div>
</body>
</html>
